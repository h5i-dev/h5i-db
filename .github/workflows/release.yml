name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p h5i-db-cli --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          BIN=h5i-db
          [ "${{ runner.os }}" = "Windows" ] && BIN=h5i-db.exe
          cp "target/${{ matrix.target }}/release/$BIN" dist/
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "h5i-db-${{ github.ref_name }}-${{ matrix.target }}.zip" "$BIN"
          else
            tar czf "h5i-db-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" "$BIN"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip

  wheels:
    name: wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/h5i-db-python
          command: build
          args: --release -o dist
      - uses: softprops/action-gh-release@v2
        with:
          files: crates/h5i-db-python/dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: crates/h5i-db-python/dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/h5i-db-python
          command: sdist
          args: -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/h5i-db-python/dist/*.tar.gz

  # Publish wheels + sdist to PyPI via trusted publishing (OIDC — no long
  # lived token). One-time setup on pypi.org: project "h5i-db" → Publishing →
  # add this repository / workflow "release.yml" / environment "pypi".
  publish-pypi:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheel-*,sdist}"
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  # Publish the Rust crates in dependency order. Requires the
  # CARGO_REGISTRY_TOKEN secret; the job is a no-op (skipped steps) until
  # the secret is configured, so tagging a release never fails on it.
  publish-crates:
    name: publish to crates.io
    needs: [binaries]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (dependency order)
        if: env.CARGO_REGISTRY_TOKEN != ''
        # --workspace (cargo >= 1.90) publishes all publishable members in
        # dependency order (observability -> core -> query -> cli/ui), skips
        # the publish = false crates, and waits for index propagation itself.
        run: cargo publish --workspace --locked
