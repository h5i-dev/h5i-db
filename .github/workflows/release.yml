name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p h5i-db-cli --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          BIN=h5i-db
          [ "${{ runner.os }}" = "Windows" ] && BIN=h5i-db.exe
          cp "target/${{ matrix.target }}/release/$BIN" dist/
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "h5i-db-${{ github.ref_name }}-${{ matrix.target }}.zip" "$BIN"
          else
            tar czf "h5i-db-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" "$BIN"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip

  wheels:
    name: wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/h5i-db-python
          command: build
          args: --release -o dist
      - uses: softprops/action-gh-release@v2
        with:
          files: crates/h5i-db-python/dist/*.whl
