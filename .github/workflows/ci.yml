name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly deep pass: fuzz smoke + perf trend (see job-level `if` guards).
    - cron: "17 4 * * 1"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Workspace tests: core (storage kernel incl. crash-safety), query
      # (SQL/pruning/ASOF), CLI (agent contract), UI (review API).
      # Per-package with capped test threads: several suites spin up
      # DataFusion sessions + tokio runtimes, and running them all at once
      # can OOM smaller machines.
      #
      # The core suite includes tests/format_compat.rs, which opens the
      # committed golden fixture (tests/fixtures/golden-v1) read-only — the
      # on-disk format-compatibility gate. A format break fails CI here.
      - run: |
          for pkg in h5i-db-core h5i-db-query h5i-db-cli h5i-db-ui; do
            cargo test -p $pkg -- --test-threads=2
          done

  # Windows exercises the pieces that genuinely differ there: rename-based
  # HEAD CAS, path handling, file locking. Core only, to bound CI cost.
  test-windows:
    name: core tests (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p h5i-db-core -- --test-threads=2

  # Build-check the whole workspace on the exact `rust-version` from
  # Cargo.toml so the declared MSRV cannot silently rot.
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Keep in sync with `rust-version` in the workspace Cargo.toml.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  # Supply-chain gates: RustSec advisories, license allowlist, duplicate
  # crates, registry sources (deny.toml) + cargo-audit over Cargo.lock.
  supply-chain:
    name: cargo-deny + cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  # Short libFuzzer smoke over the untrusted-input surfaces (manifest/HEAD
  # JSON, CSV ingest, SQL text). Scheduled + main pushes only: the fuzz
  # build is expensive and a 60 s run is a regression canary, not a soak.
  fuzz-smoke:
    name: fuzz smoke (60s/target)
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - run: |
          for target in manifest_json csv_ingest sql_parse; do
            cargo +nightly fuzz run "$target" -- -max_total_time=60
          done
      - name: Upload crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/

  # Perf-trend tracking: run the real benchmark on a schedule (and on main)
  # and keep the JSON as a long-retention artifact so regressions can be
  # traced across commits. bench-smoke (above, every PR) is the correctness
  # canary; this job is the trend record.
  perf-trend:
    name: benchmark trend
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmark
        run: |
          cargo run -p h5i-db-bench --profile bench-fast -- \
            --trades 5000000 --quotes 1000000 --commits 20 > bench-trend.json
          {
            echo '{"commit":"${{ github.sha }}","run":"${{ github.run_id }}",'
            echo '"date":"'"$(date -u +%FT%TZ)"'","results":'
            cat bench-trend.json
            echo '}'
          } > bench-trend-stamped.json
      - uses: actions/upload-artifact@v4
        with:
          name: bench-trend-${{ github.run_id }}
          path: bench-trend-stamped.json
          retention-days: 90

  python:
    name: python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/h5i-db-python
          command: build
          args: --release -o dist
      - name: Smoke test wheel
        run: |
          pip install crates/h5i-db-python/dist/*.whl pyarrow
          python - <<'EOF'
          import pyarrow as pa
          import h5i_db

          db = h5i_db.Database("smoke.db", create=True)
          schema = pa.schema([
              pa.field("ts", pa.timestamp("ns", tz="UTC"), nullable=False),
              pa.field("symbol", pa.string(), nullable=False),
              pa.field("price", pa.float64(), nullable=False),
          ])
          db.create_table("trades", schema, time_column="ts")
          t = pa.table({
              "ts": pa.array([1, 2, 3], pa.timestamp("ns", tz="UTC")),
              "symbol": ["A", "B", "A"],
              "price": [1.0, 2.0, 3.0],
          }).cast(schema)
          db.append("trades", t)
          out = db.sql("SELECT symbol, count(*) n FROM trades GROUP BY symbol ORDER BY symbol")
          assert out.to_arrow().num_rows == 2, out.to_arrow()
          old = db.read("trades", version=0)
          assert old.num_rows == 0
          plan = db.plan_delete_range("trades", 0, 2)
          assert plan.summary["rows_affected"] == 1
          plan.apply()
          assert len(db.sql("SELECT * FROM trades")) == 2
          print("python smoke OK")
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: crates/h5i-db-python/dist/*.whl

  bench-smoke:
    name: benchmark smoke (small)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tiny benchmark (regression canary)
        run: |
          cargo run -p h5i-db-bench --profile bench-fast -- \
            --trades 500000 --quotes 100000 --commits 10 > bench.json
          python3 - <<'EOF'
          import json
          results = {r["name"]: r for r in json.load(open("bench.json"))}
          # Pruning must actually prune on narrow scans.
          narrow = results["time-range scan 0.01%"]["detail"]
          assert narrow["segments_pruned"] > 0, narrow
          # Version resolution must stay metadata-speed.
          assert results["cold read of version 3 (metadata only)"]["wall_ms"] < 250
          print("bench smoke OK")
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.json
