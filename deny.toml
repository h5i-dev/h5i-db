# cargo-deny configuration (checked in CI by EmbarkStudios/cargo-deny-action).
#
# Scope: RustSec advisories, license allowlist, duplicate-version hygiene,
# and registry-source pinning for the whole workspace.

[graph]
# Match what we actually build/ship; feature-gated optional deps that are
# never enabled should not fail the gate.
all-features = false

[advisories]
version = 2
# A yanked crate in the lockfile is always a mistake.
yanked = "deny"
# Transitive through Arrow/DataFusion's derive stack. `paste` is unmaintained,
# not vulnerable; remove this exception when the upstream dependency does.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
# Permissive licenses only — the tree is the standard Rust data ecosystem
# (arrow/parquet/datafusion/tokio/serde). Anything outside this list should
# be a conscious decision, not a transitive surprise.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",          # blake3 (dual CC0-1.0 OR Apache-2.0)
    "CDLA-Permissive-2.0", # Mozilla root-certificate data via rustls verifier
    "Unicode-3.0",      # unicode-ident, icu_* (idna/url stack)
    "Unicode-DFS-2016", # older unicode-ident releases
]
confidence-threshold = 0.9

[bans]
# Duplicate major versions bloat the binary but are routine in the arrow
# ecosystem during upgrades — surface them without failing the build.
multiple-versions = "warn"
# Wildcard requirements make builds non-reproducible.
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
