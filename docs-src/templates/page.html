<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} · h5i-db docs</title>
  <meta name="description" content="{{description}}">
  <meta name="author" content="h5i-dev">
  <meta name="theme-color" content="#D21C1C">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/png" href="{{root}}_static/logo.png">
  <link rel="apple-touch-icon" href="{{root}}_static/logo.png">

  <meta property="og:type" content="article">
  <meta property="og:site_name" content="h5i-db">
  <meta property="og:title" content="{{title}} · h5i-db docs">
  <meta property="og:description" content="{{description}}">
  <meta property="og:image" content="https://db.h5i.dev/_static/logo.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{title}} · h5i-db docs">
  <meta name="twitter:description" content="{{description}}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{root}}_static/docs.css">
</head>
<body>

<a class="skip-link" href="#content">Skip to content</a>
<div class="bg-grid"></div>

<nav class="topnav">
  <a class="nav-logo" href="{{root}}">
    <img src="{{root}}_static/logo.png" alt="h5i-db">
    <span>h5i-db</span>
  </a>
  <ul class="nav-links" id="nav-links">
    <li><a href="{{root}}manual/" {{active_manual}}>Manual</a></li>
    <li><a href="{{root}}api/" {{active_api}}>Python API</a></li>
    <li><a href="{{root}}cookbook/" {{active_cookbook}}>Cookbook</a></li>
    <li><a href="{{root}}#benchmarks">Benchmarks</a></li>
    <li><a href="https://github.com/h5i-dev/h5i-db" class="nav-cta">GitHub →</a></li>
  </ul>
  <button class="nav-hamburger" id="hamburger" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="docs-shell">
  <aside class="sidebar" id="sidebar">
    <div class="search-box">
      <input type="search" id="doc-search" placeholder="Search docs" autocomplete="off"
             aria-label="Search documentation">
      <kbd>/</kbd>
      <div class="search-results" id="search-results" role="listbox"></div>
    </div>
{{sidebar}}
  </aside>

  <article class="doc" id="content">
    <button class="sidebar-toggle" id="sidebar-toggle">☰&nbsp; Menu</button>
    <div class="breadcrumb">{{breadcrumb}}</div>
{{content}}
    <nav class="page-nav">{{prevnext}}</nav>
  </article>

  <aside class="toc" id="toc">{{toc}}</aside>
</div>

<footer class="docs-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <img src="{{root}}_static/logo.png" alt="h5i-db">
      <span>h5i-db<span class="sub"> / part of the h5i toolchain</span></span>
    </div>
    <nav class="footer-links">
      <a href="{{root}}">Home</a>
      <a href="{{root}}manual/">Manual</a>
      <a href="{{root}}api/">Python API</a>
      <a href="{{root}}cookbook/">Cookbook</a>
      <a href="https://github.com/h5i-dev/h5i-db">GitHub</a>
      <a href="https://github.com/h5i-dev/h5i-db/blob/main/LICENSE">License</a>
    </nav>
    <div class="footer-legal">Apache 2.0 · Built with Rust</div>
  </div>
</footer>

<script>window.__DOCS_ROOT__ = "{{root}}";</script>
<script src="{{root}}_static/docs.js" defer></script>
</body>
</html>
